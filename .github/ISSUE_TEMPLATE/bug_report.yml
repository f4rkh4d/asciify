name: Bug report
description: Something didn't work as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: asciify version
      placeholder: "output of `asciify --version`"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS, terminal, $COLORTERM
      placeholder: "e.g. macOS 15.4 / Alacritty 0.13 / COLORTERM=truecolor"
    validations:
      required: true
  - type: textarea
    id: cmd
    attributes:
      label: Command you ran
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to see?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What did you see instead?
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Sample image (optional)
      description: Attach a small image that reproduces the issue, or a link to one.
